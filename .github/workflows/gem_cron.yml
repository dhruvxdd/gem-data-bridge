name: Daily GeM Feed Ingestion

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: 

jobs:
  build-and-scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # Explicitly uses the write token you enabled

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Scraping Dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Scraper
      run: python cloud_scraper.py

    - name: Commit and Push Updated Data File
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add gem_live_feeds.json
        git commit -m "Automated Sync: Live GeM Feeds Updated" || exit 0
        git push origin main
